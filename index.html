<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .card-swim { border-top: 8px solid #0077B6; }
        .card-upper { border-top: 8px solid #E63946; }
        .card-legs { border-top: 8px solid #FFB703; }
        body { background-color: #f3f4f6; }
    </style>
</head>
<body class="p-4 pb-20">

    <header class="mb-8 mt-4 text-center">
        <h1 class="text-3xl font-extrabold text-gray-800 tracking-tight">MON <span class="text-blue-600">SUIVI</span></h1>
        <p class="text-gray-500">Mars - Avril 2026</p>
    </header>

    <div class="max-w-md mx-auto space-y-6">
        
        <div class="bg-white rounded-2xl shadow-sm p-5 card-swim">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-3">
                    <i data-lucide="waves" class="text-blue-600"></i>
                    <h2 class="text-xl font-bold text-gray-800 uppercase italic">Swimming</h2>
                </div>
                <span class="text-xs font-semibold bg-blue-100 text-blue-700 px-2 py-1 rounded">Brasse</span>
            </div>
            <div class="grid grid-cols-2 gap-4 bg-blue-50 p-4 rounded-xl">
                <div>
                    <p class="text-xs text-blue-600 font-bold uppercase">Allers-Retours</p>
                    <input type="number" value="11" class="bg-transparent text-2xl font-black w-full focus:outline-none">
                </div>
                <div class="text-right border-l border-blue-200 pl-4">
                    <p class="text-xs text-blue-600 font-bold uppercase">Distance</p>
                    <p class="text-2xl font-black">550 <span class="text-sm">m</span></p>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm p-5 card-upper">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-3">
                    <i data-lucide="dumbbell" class="text-red-500"></i>
                    <h2 class="text-xl font-bold text-gray-800 uppercase italic">Upper Body</h2>
                </div>
                <span class="text-xs font-semibold bg-red-100 text-red-700 px-2 py-1 rounded">Machine A</span>
            </div>
            <div class="flex justify-between items-center mb-4">
                <div class="flex gap-2 text-center">
                    <div class="bg-gray-100 w-10 h-10 rounded-lg flex items-center justify-center font-bold">12</div>
                    <div class="bg-gray-100 w-10 h-10 rounded-lg flex items-center justify-center font-bold text-gray-400">12</div>
                    <div class="bg-gray-100 w-10 h-10 rounded-lg flex items-center justify-center font-bold text-gray-400">8</div>
                </div>
                <div class="text-right">
                    <p class="text-2xl font-black text-red-600">60 <span class="text-sm">kg</span></p>
                </div>
            </div>
            <button class="w-full py-3 bg-red-500 text-white rounded-xl font-bold shadow-lg shadow-red-200 active:scale-95 transition-transform">
                Log New Session
            </button>
        </div>

        <div class="bg-white rounded-2xl shadow-sm p-5 card-legs">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-3">
                    <i data-lucide="zap" class="text-yellow-500"></i>
                    <h2 class="text-xl font-bold text-gray-800 uppercase italic">Legs</h2>
                </div>
                <span class="text-xs font-semibold bg-yellow-100 text-yellow-700 px-2 py-1 rounded">Machine A</span>
            </div>
            <div class="grid grid-cols-2 gap-2 mb-4">
                <div class="bg-gray-50 p-3 rounded-lg border border-gray-100">
                    <p class="text-[10px] uppercase font-bold text-gray-400">Dernier Poids</p>
                    <p class="text-lg font-bold italic">60.0 kg</p>
                </div>
                <div class="bg-gray-50 p-3 rounded-lg border border-gray-100">
                    <p class="text-[10px] uppercase font-bold text-gray-400">Objectif Next</p>
                    <p class="text-lg font-bold italic text-yellow-600">62.5 kg</p>
                </div>
            </div>
            <button class="w-full py-3 bg-yellow-500 text-white rounded-xl font-bold shadow-lg shadow-yellow-100 active:scale-95 transition-transform">
                Start Training
            </button>
        </div>

    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-3 flex justify-around items-center">
        <button class="text-blue-600 flex flex-col items-center"><i data-lucide="calendar"></i><span class="text-[10px]">Historique</span></button>
        <button class="bg-black text-white p-3 rounded-full -mt-10 shadow-xl"><i data-lucide="plus"></i></button>
        <button class="text-gray-400 flex flex-col items-center"><i data-lucide="trending-up"></i><span class="text-[10px]">Stats</span></button>
    </nav>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
