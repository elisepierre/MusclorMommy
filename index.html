<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Musclor Mommy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: white; height: 100vh; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; }
        .text-gradient { background: linear-gradient(135deg, #ff0080 0%, #ff8c00 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; outline: none; text-align: center; }
        input:focus { border-color: #ff0080; }
        .tab-btn { opacity: 0.3; transition: 0.2s; }
        .tab-btn.active { opacity: 1; transform: scale(1.05); }
        .view-container { height: calc(100vh - 160px); overflow-y: auto; scrollbar-width: none; padding-bottom: 60px; }
        .view-container::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-3">

    <header class="flex justify-between items-center mb-3 px-1">
        <h1 class="text-xl font-black italic text-gradient uppercase tracking-tighter">Musclor Mommy</h1>
        <input type="date" id="input-date" class="bg-transparent border-none text-[10px] font-bold text-gray-500 uppercase w-24">
    </header>

    <div class="flex justify-center gap-6 mb-4">
        <button onclick="setGlobalFilter('swim')" id="btn-swim" class="tab-btn flex flex-col items-center"><div class="p-2.5 rounded-full bg-blue-500/10 text-blue-400"><i data-lucide="waves" size="18"></i></div><span class="text-[7px] font-black uppercase mt-1">Pool</span></button>
        <button onclick="setGlobalFilter('upper')" id="btn-upper" class="tab-btn flex flex-col items-center"><div class="p-2.5 rounded-full bg-red-500/10 text-red-400"><i data-lucide="dumbbell" size="18"></i></div><span class="text-[7px] font-black uppercase mt-1 text-red-400">Upper</span></button>
        <button onclick="setGlobalFilter('legs')" id="btn-legs" class="tab-btn flex flex-col items-center"><div class="p-2.5 rounded-full bg-yellow-500/10 text-yellow-400"><i data-lucide="zap" size="18"></i></div><span class="text-[7px] font-black uppercase mt-1 text-yellow-400">Legs</span></button>
    </div>

    <div class="view-container">
        <div id="view-log" class="space-y-3">
            <div class="glass p-4 space-y-3">
                <input type="text" id="exercise-name" list="suggestions" placeholder="MACHINE / NAGE" class="w-full py-2.5 text-sm font-bold uppercase">
                <datalist id="suggestions"></datalist>

                <div id="pool-fields" class="hidden text-center">
                    <input type="number" id="swim-laps" placeholder="LONGUEURS" class="w-full py-3 text-3xl font-black text-blue-400">
                </div>

                <div id="muscle-fields" class="space-y-3">
                    <div class="flex gap-2">
                        <div class="flex-1 relative">
                            <input type="number" id="weight" placeholder="POIDS" class="w-full py-3 text-2xl font-black">
                            <button onclick="toggleUnit()" id="unit-btn" class="absolute right-2 top-1 text-[7px] font-black text-gray-500">KG</button>
                        </div>
                        <input type="number" id="reps" placeholder="REPS" class="w-1/3 py-3 text-2xl font-black italic text-pink-500">
                    </div>
                </div>
                <button onclick="addEntry()" class="w-full py-3 bg-gradient-to-r from-pink-500 to-rose-500 rounded-xl font-black text-xs uppercase tracking-widest shadow-lg shadow-pink-500/20 active:scale-95 transition">ENREGISTRER</button>
            </div>
        </div>

        <div id="view-history" class="hidden space-y-2"></div>
        <div id="view-stats" class="hidden space-y-4"></div>
    </div>

    <nav class="fixed bottom-4 left-4 right-4 h-14 glass flex justify-around items-center border border-white/5 shadow-2xl">
        <button onclick="changeTab('log')"><i data-lucide="plus" id="nav-log" class="text-gray-500"></i></button>
        <button onclick="changeTab('history')"><i data-lucide="list" id="nav-history" class="text-gray-500"></i></button>
        <button onclick="changeTab('stats')"><i data-lucide="activity" id="nav-stats" class="text-gray-500"></i></button>
    </nav>

    <script>
        let currentType = 'upper'; 
        let entries = JSON.parse(localStorage.getItem('mm_v10_data')) || [];
        let currentTab = 'log';
        let isLb = false;
        document.getElementById('input-date').valueAsDate = new Date();

        function toggleUnit() { isLb = !isLb; document.getElementById('unit-btn').innerText = isLb ? 'LB' : 'KG'; }

        function setGlobalFilter(type) {
            currentType = (currentType === type) ? null : type;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if(currentType) document.getElementById('btn-'+currentType).classList.add('active');
            document.getElementById('pool-fields').classList.toggle('hidden', currentType !== 'swim');
            document.getElementById('muscle-fields').classList.toggle('hidden', currentType === 'swim');
            refreshCurrentView();
            updateSuggestions();
        }

        function changeTab(tab) {
            currentTab = tab;
            ['log', 'history', 'stats'].forEach(t => document.getElementById('view-'+t).classList.add('hidden'));
            document.getElementById('view-'+tab).classList.remove('hidden');
            document.querySelectorAll('nav i').forEach(i => i.classList.remove('text-pink-500'));
            document.getElementById('nav-'+tab).classList.add('text-pink-500');
            refreshCurrentView();
        }

        function addEntry() {
            const name = document.getElementById('exercise-name').value.trim().toUpperCase();
            if(!name || !currentType) return;
            
            let weight = parseFloat(document.getElementById('weight').value) || 0;
            if(isLb) weight = parseFloat((weight * 0.453).toFixed(1));
            const reps = parseInt(document.getElementById('reps').value) || 0;
            const laps = parseInt(document.getElementById('swim-laps').value) || 0;
            const date = document.getElementById('input-date').value;

            // FUSION : Chercher si la machine existe déjà ce jour là
            let existing = entries.find(e => e.date === date && e.name === name && e.type === currentType);
            
            if(existing) {
                if(currentType === 'swim') {
                    existing.v1 = parseInt(existing.v1) + laps;
                    existing.v2 = existing.v1 * 25;
                } else {
                    existing.v1 = existing.v1 + " | " + weight;
                    existing.v2 = existing.v2 + " | " + reps;
                    // On stocke le max valide (reps >= 8) pour le chart
                    if(reps >= 8 && weight > (existing.bestWeight || 0)) existing.bestWeight = weight;
                }
            } else {
                entries.push({
                    id: Date.now(), date, type: currentType, name, 
                    v1: currentType === 'swim' ? laps : weight,
                    v2: currentType === 'swim' ? laps * 25 : reps,
                    bestWeight: (currentType !== 'swim' && reps >= 8) ? weight : 0
                });
            }
            localStorage.setItem('mm_v10_data', JSON.stringify(entries));
            alert("Check! 💪");
            document.getElementById('reps').value = ""; document.getElementById('weight').value = "";
            updateSuggestions();
        }

        function renderHistory() {
            const container = document.getElementById('view-history');
            const filtered = currentType ? entries.filter(e => e.type === currentType) : entries;
            container.innerHTML = filtered.slice().reverse().map(e => `
                <div class="glass p-3 flex justify-between items-center border-l-2 ${e.type==='swim'?'border-blue-500':e.type==='upper'?'border-red-500':'border-yellow-500'}">
                    <div class="flex-1"><p class="text-[7px] text-gray-500 font-bold">${e.date}</p><p class="font-bold uppercase text-[10px] tracking-tight">${e.name}</p></div>
                    <div class="text-right min-w-[80px]">
                        <p class="font-black text-xs">${e.v1}<span class="text-[7px] ml-1 text-gray-500">${e.type==='swim'?'L':'KG'}</span></p>
                        <p class="text-[8px] text-pink-500 font-bold">${e.v2}${e.type==='swim'?'m':''}</p>
                    </div>
                    <button onclick="deleteEntry(${e.id})" class="ml-2 text-gray-800"><i data-lucide="trash-2" size="12"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function renderProgression() {
            const container = document.getElementById('view-stats');
            container.innerHTML = "";
            const filtered = currentType ? entries.filter(e => e.type === currentType) : entries;
            const machines = [...new Set(filtered.map(e => e.name))];

            machines.forEach(m => {
                const data = filtered.filter(e => e.name === m).sort((a,b) => new Date(a.date) - new Date(b.date));
                const card = document.createElement('div');
                card.className = "glass p-3";
                card.innerHTML = `<p class="text-[8px] font-black text-pink-500 uppercase mb-2">${m} (BEST @ 8+ REPS)</p><canvas id="chart-${m.replace(/\s+/g, '-')}"></canvas>`;
                container.appendChild(card);

                new Chart(document.getElementById(`chart-${m.replace(/\s+/g, '-')}`), {
                    type: 'line',
                    data: {
                        labels: data.map(d => d.date),
                        datasets: [{
                            data: data.map(d => d.type === 'swim' ? d.v2 : d.bestWeight),
                            borderColor: data[0].type === 'swim' ? '#3b82f6' : '#ff0080',
                            fill: false, tension: 0.3, pointRadius: 3
                        }]
                    },
                    options: { plugins: { legend: { display: false } }, scales: { y: { display: true, ticks: { font: { size: 7 } } }, x: { display: false } } }
                });
            });
        }

        function deleteEntry(id) {
            entries = entries.filter(e => e.id !== id);
            localStorage.setItem('mm_v10_data', JSON.stringify(entries));
            refreshCurrentView();
        }

        function updateSuggestions() {
            const list = document.getElementById('suggestions');
            const unique = [...new Set(entries.filter(e => !currentType || e.type === currentType).map(e => e.name))];
            list.innerHTML = unique.map(name => `<option value="${name}">`).join('');
        }

        function refreshCurrentView() {
            if(currentTab === 'history') renderHistory();
            if(currentTab === 'stats') renderProgression();
        }

        lucide.createIcons();
        setGlobalFilter('upper');
    </script>
</body>
</html>
