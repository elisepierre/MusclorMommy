<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Musclor Mommy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: white; height: 100vh; overflow: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        .text-gradient { background: linear-gradient(135deg, #ff0080 0%, #ff8c00 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .accent-pink { background: linear-gradient(135deg, #ff0080 0%, #ff8c00 100%); }
        input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; text-align: center; outline: none; }
        input:focus { border-color: #ff0080; }
        .tab-btn { opacity: 0.3; transition: 0.3s; }
        .tab-btn.active { opacity: 1; transform: scale(1.05); }
        .view-container { height: calc(100vh - 180px); overflow-y: auto; scrollbar-width: none; }
        .view-container::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4">

    <header class="text-center py-2">
        <h1 class="text-2xl font-black tracking-tighter text-gradient uppercase italic leading-none">Musclor Mommy</h1>
        <div class="flex justify-center mt-2">
            <input type="date" id="input-date" class="bg-transparent border-none text-[10px] font-bold text-gray-500 uppercase">
        </div>
    </header>

    <div class="flex justify-center gap-8 my-4">
        <button onclick="setType('swim')" id="btn-swim" class="tab-btn flex flex-col items-center gap-1">
            <div class="p-3 rounded-full bg-blue-500/20 text-blue-400"><i data-lucide="waves" size="20"></i></div>
            <span class="text-[8px] font-black uppercase">Pool</span>
        </button>
        <button onclick="setType('upper')" id="btn-upper" class="tab-btn active flex flex-col items-center gap-1">
            <div class="p-3 rounded-full bg-red-500/20 text-red-400"><i data-lucide="dumbbell" size="20"></i></div>
            <span class="text-[8px] font-black uppercase">Upper</span>
        </button>
        <button onclick="setType('legs')" id="btn-legs" class="tab-btn flex flex-col items-center gap-1">
            <div class="p-3 rounded-full bg-yellow-500/20 text-yellow-400"><i data-lucide="zap" size="20"></i></div>
            <span class="text-[8px] font-black uppercase">Legs</span>
        </button>
    </div>

    <div class="view-container">
        <div id="view-log" class="space-y-4 pb-10">
            <div class="glass-card p-5 space-y-4">
                <div class="text-center space-y-1">
                    <label id="label-name" class="text-[9px] font-black text-gray-500 uppercase tracking-widest">Machine utilisée</label>
                    <input type="text" id="exercise-name" list="suggestions" placeholder="Ex: Presse, Crawl..." class="w-full py-3 text-lg font-bold uppercase tracking-tight">
                    <datalist id="suggestions"></datalist>
                </div>

                <div id="pool-fields" class="hidden text-center">
                    <label class="text-[9px] font-black text-blue-500 uppercase tracking-widest block mb-1">Longueurs (25m)</label>
                    <input type="number" id="swim-laps" oninput="calcDist()" class="w-full py-4 text-4xl font-black text-blue-400">
                    <p class="mt-1 text-xs font-bold text-gray-500">Distance : <span id="swim-total" class="text-white">0</span>m</p>
                </div>

                <div id="muscle-fields" class="space-y-4">
                    <div class="text-center">
                        <label class="text-[9px] font-black text-red-500 uppercase tracking-widest block mb-1">Charge (KG)</label>
                        <input type="number" id="weight" class="w-full py-4 text-4xl font-black">
                    </div>
                    <div class="text-center space-y-1">
                        <label class="text-[9px] font-black text-gray-500 uppercase tracking-widest block">Répétitions</label>
                        <div class="flex gap-2">
                            <input type="number" id="rep1" placeholder="S1" class="w-1/3 py-3 text-xl font-bold">
                            <input type="number" id="rep2" placeholder="S2" class="w-1/3 py-3 text-xl font-bold border-pink-500/20">
                            <input type="number" id="rep3" placeholder="S3" class="w-1/3 py-3 text-xl font-bold">
                        </div>
                    </div>
                </div>

                <button onclick="addEntry()" class="w-full py-4 accent-pink rounded-xl font-black text-sm shadow-lg uppercase italic active:scale-95 transition-all">Enregistrer</button>
            </div>
        </div>

        <div id="view-history" class="hidden space-y-3 pb-10">
            <div id="history-container" class="space-y-2 text-sm"></div>
        </div>

        <div id="view-stats" class="hidden space-y-4 pb-10 text-center">
            <div class="glass-card p-4">
                <select id="stat-filter" onchange="renderChart()" class="bg-transparent border-none text-xs font-bold text-pink-500 uppercase mb-4 outline-none"></select>
                <canvas id="progChart"></canvas>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-4 left-4 right-4 h-16 glass-card flex justify-around items-center border border-white/10 shadow-2xl">
        <button onclick="showTab('log')" class="p-2"><i data-lucide="plus-square" class="text-gray-400"></i></button>
        <button onclick="showTab('history')" class="p-2"><i data-lucide="calendar" class="text-gray-400"></i></button>
        <button onclick="showTab('stats')" class="p-2"><i data-lucide="line-chart" class="text-gray-400"></i></button>
    </nav>

    <script>
        let currentType = 'upper';
        let entries = JSON.parse(localStorage.getItem('mm_v4_data')) || [];
        document.getElementById('input-date').valueAsDate = new Date();

        function setType(type) {
            currentType = type;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-'+type).classList.add('active');
            document.getElementById('pool-fields').classList.toggle('hidden', type !== 'swim');
            document.getElementById('muscle-fields').classList.toggle('hidden', type === 'swim');
            document.getElementById('label-name').innerText = type === 'swim' ? "Type de nage" : "Machine utilisée";
            updateSuggestions();
        }

        function updateSuggestions() {
            const list = document.getElementById('suggestions');
            const unique = [...new Set(entries.filter(e => e.type === currentType).map(e => e.name))];
            list.innerHTML = unique.map(name => `<option value="${name}">`).join('');
        }

        function calcDist() {
            document.getElementById('swim-total').innerText = (document.getElementById('swim-laps').value || 0) * 25;
        }

        function addEntry() {
            const name = document.getElementById('exercise-name').value;
            if(!name) return alert("Nom manquant !");
            const entry = {
                id: Date.now(),
                date: document.getElementById('input-date').value,
                type: currentType,
                name: name.toUpperCase(),
                v1: currentType === 'swim' ? document.getElementById('swim-laps').value : document.getElementById('weight').value,
                v2: currentType === 'swim' ? (document.getElementById('swim-laps').value * 25) : `${document.getElementById('rep1').value || 0}/${document.getElementById('rep2').value || 0}/${document.getElementById('rep3').value || 0}`
            };
            entries.push(entry);
            localStorage.setItem('mm_v4_data', JSON.stringify(entries));
            updateSuggestions();
            alert("✨ Validé !");
            document.getElementById('exercise-name').value = "";
        }

        function showTab(tab) {
            document.getElementById('view-log').classList.add('hidden');
            document.getElementById('view-history').classList.add('hidden');
            document.getElementById('view-stats').classList.add('hidden');
            document.getElementById('view-'+tab).classList.remove('hidden');
            if(tab === 'history') renderHistory();
            if(tab === 'stats') setupStats();
        }

        function deleteEntry(id) {
            if(confirm("Supprimer cette séance ?")) {
                entries = entries.filter(e => e.id !== id);
                localStorage.setItem('mm_v4_data', JSON.stringify(entries));
                renderHistory();
            }
        }

        function renderHistory() {
            const container = document.getElementById('history-container');
            container.innerHTML = entries.slice().reverse().map(e => `
                <div class="glass-card p-4 flex justify-between items-center relative border-l-2 ${e.type==='swim'?'border-blue-500':e.type==='upper'?'border-red-500':'border-yellow-500'}">
                    <div>
                        <p class="text-[8px] font-black text-gray-500">${e.date}</p>
                        <p class="font-bold uppercase italic">${e.name}</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="text-right">
                            <p class="font-black">${e.v1}<span class="text-[8px] ml-1 text-gray-400">${e.type==='swim'?'L':'KG'}</span></p>
                            <p class="text-[8px] text-pink-500 font-bold italic">${e.v2}${e.type==='swim'?'m':''}</p>
                        </div>
                        <button onclick="deleteEntry(${e.id})" class="opacity-30"><i data-lucide="trash-2" size="14"></i></button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function setupStats() {
            const filter = document.getElementById('stat-filter');
            const unique = [...new Set(entries.map(e => e.name))];
            filter.innerHTML = unique.map(n => `<option value="${n}">${n}</option>`).join('');
            renderChart();
        }

        let myChart;
        function renderChart() {
            const name = document.getElementById('stat-filter').value;
            const data = entries.filter(e => e.name === name).sort((a,b) => new Date(a.date) - new Date(b.date));
            const ctx = document.getElementById('progChart');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => d.date),
                    datasets: [{
                        data: data.map(d => d.v1),
                        borderColor: '#ff0080',
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(255, 0, 128, 0.1)'
                    }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' } }, x: { display: false } } }
            });
        }

        lucide.createIcons();
        updateSuggestions();
    </script>
</body>
</html>
