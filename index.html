<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Musclor Mommy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: white; height: 100vh; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        .text-gradient { background: linear-gradient(135deg, #ff0080 0%, #ff8c00 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; outline: none; text-align: center; color: white; }
        .tab-btn { opacity: 0.2; transition: 0.3s; }
        .tab-btn.active { opacity: 1; transform: scale(1.1); }
        .view-container { height: calc(100vh - 220px); overflow-y: auto; scrollbar-width: none; padding-bottom: 40px; }
        .view-container::-webkit-scrollbar { display: none; }
        .badge-common { padding: 2px 8px; border-radius: 8px; font-size: 10px; font-weight: 800; }
        .hidden { display: none !important; }
        /* Modal for Media */
        #media-modal { background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 100; }
    </style>
</head>
<body class="p-5">

    <div id="media-modal" class="fixed inset-0 hidden flex items-center justify-center p-6">
        <div class="glass w-full max-w-sm p-4 relative">
            <button onclick="closeMedia()" class="absolute -top-12 right-0 text-white"><i data-lucide="x-circle" size="32"></i></button>
            <div id="media-content" class="rounded-xl overflow-hidden bg-black min-h-[200px] flex items-center justify-center text-xs text-gray-500">
                </div>
        </div>
    </div>

    <header class="flex flex-col items-center mb-4">
        <h1 class="text-xl font-black italic text-gradient uppercase tracking-tighter text-center">Musclor Mommy</h1>
        <input type="date" id="input-date" class="mt-2 bg-transparent border-none text-[11px] font-bold text-gray-500 uppercase outline-none">
    </header>

    <div class="flex justify-center gap-10 mb-6">
        <button onclick="setGlobalFilter('swim')" id="btn-swim" class="tab-btn flex flex-col items-center"><div class="p-3.5 rounded-full bg-blue-500/10 text-blue-400 border border-blue-500/20"><i data-lucide="waves" size="20"></i></div><span class="text-[8px] font-black uppercase mt-1 text-blue-400">Pool</span></button>
        <button onclick="setGlobalFilter('upper')" id="btn-upper" class="tab-btn flex flex-col items-center"><div class="p-3.5 rounded-full bg-pink-500/10 text-pink-400 border border-pink-500/20"><i data-lucide="dumbbell" size="20"></i></div><span class="text-[8px] font-black uppercase mt-1 text-pink-400">Upper</span></button>
        <button onclick="setGlobalFilter('legs')" id="btn-legs" class="tab-btn flex flex-col items-center"><div class="p-3.5 rounded-full bg-yellow-500/10 text-yellow-400 border border-yellow-500/20"><i data-lucide="zap" size="20"></i></div><span class="text-[8px] font-black uppercase mt-1 text-yellow-400">Legs</span></button>
    </div>

    <div class="view-container">
        <div id="view-log" class="hidden animate-in fade-in zoom-in duration-300">
            <div class="glass p-5 space-y-5">
                <input type="text" id="exercise-name" list="suggestions" placeholder="NOM DE LA MACHINE" class="w-full py-4 text-lg font-black uppercase tracking-tight">
                <datalist id="suggestions"></datalist>

                <div id="pool-fields" class="hidden text-center">
                    <input type="number" id="swim-laps" oninput="calcDist()" placeholder="LONGUEURS" class="w-full py-5 text-4xl font-black text-blue-400">
                    <p class="mt-2 text-xs font-bold text-gray-400 italic">Distance : <span id="swim-total" class="text-blue-400">0</span>m</p>
                </div>

                <div id="muscle-fields" class="space-y-4">
                    <div class="flex gap-3">
                        <div class="flex-1 relative">
                            <input type="number" id="weight" placeholder="POIDS" class="w-full py-4 text-3xl font-black">
                            <button onclick="toggleUnit()" id="unit-btn" class="absolute right-2 top-1 text-[8px] font-black text-gray-500 bg-white/5 px-2 py-1 rounded">KG</button>
                        </div>
                        <input type="number" id="reps" placeholder="REPS" class="w-1/3 py-4 text-3xl font-black italic">
                    </div>
                </div>
                <button onclick="addEntry()" id="btn-submit-log" class="w-full py-4 rounded-xl font-black text-xs uppercase tracking-widest active:scale-95 transition-all">Enregistrer</button>
            </div>
        </div>

        <div id="view-history" class="hidden space-y-3"></div>
        <div id="view-stats" class="hidden space-y-6"></div>
    </div>

    <nav class="fixed bottom-6 left-6 right-6 h-18 glass flex items-center justify-between px-10 border border-white/10 shadow-2xl">
        <button onclick="changeTab('log')"><i data-lucide="plus-circle" id="nav-log" class="text-gray-500 hover:text-pink-500 transition"></i></button>
        <button onclick="changeTab('history')"><i data-lucide="list" id="nav-history" class="text-gray-500 hover:text-pink-500 transition"></i></button>
        <button onclick="changeTab('stats')"><i data-lucide="activity" id="nav-stats" class="text-gray-500 hover:text-pink-500 transition"></i></button>
    </nav>

    <script>
        let currentType = null; 
        let entries = JSON.parse(localStorage.getItem('mm_v13_data')) || [];
        let mediaMap = JSON.parse(localStorage.getItem('mm_media_map')) || {}; 
        let currentTab = 'log';
        let isLb = false;
        document.getElementById('input-date').valueAsDate = new Date();

        function toggleUnit() { isLb = !isLb; document.getElementById('unit-btn').innerText = isLb ? 'LB' : 'KG'; }

        function setGlobalFilter(type) {
            currentType = (currentType === type) ? null : type;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            const submitBtn = document.getElementById('btn-submit-log');
            if(currentType) {
                document.getElementById('btn-'+currentType).classList.add('active');
                document.getElementById('view-log').classList.remove('hidden');
                document.getElementById('pool-fields').classList.toggle('hidden', currentType !== 'swim');
                document.getElementById('muscle-fields').classList.toggle('hidden', currentType === 'swim');
                submitBtn.className = `w-full py-4 rounded-xl font-black text-xs uppercase tracking-widest text-white active:scale-95 transition-all ${currentType==='swim'?'bg-blue-600':currentType==='upper'?'bg-pink-600':'bg-yellow-600'}`;
            } else { document.getElementById('view-log').classList.add('hidden'); }
            refreshCurrentView();
            updateSuggestions();
        }

        function changeTab(tab) {
            currentTab = tab;
            ['log', 'history', 'stats'].forEach(t => document.getElementById('view-'+t).classList.add('hidden'));
            if (tab === 'log' && currentType) document.getElementById('view-log').classList.remove('hidden');
            else if (tab !== 'log') document.getElementById('view-'+tab).classList.remove('hidden');
            document.querySelectorAll('nav i').forEach(i => i.classList.remove('text-pink-500'));
            document.getElementById('nav-'+tab).classList.add('text-pink-500');
            refreshCurrentView();
        }

        function addEntry() {
            const name = document.getElementById('exercise-name').value.trim().toUpperCase();
            if(!name || !currentType) return;
            let weight = parseFloat(document.getElementById('weight').value) || 0;
            if(isLb) weight = parseFloat((weight * 0.453).toFixed(1));
            const reps = parseInt(document.getElementById('reps').value) || 0;
            const laps = parseInt(document.getElementById('swim-laps').value) || 0;
            const date = document.getElementById('input-date').value;

            let existing = entries.find(e => e.date === date && e.name === name && e.type === currentType);
            if(existing) {
                if(currentType === 'swim') { existing.v1 = (parseInt(existing.v1) || 0) + laps; existing.v2 = existing.v1 * 25; } 
                else { existing.allWeights = [...(existing.allWeights || [existing.v1]), weight]; existing.allReps = [...(existing.allReps || [existing.v2]), reps];
                if(reps >= 8 && weight > (existing.bestWeight || 0)) existing.bestWeight = weight; }
            } else {
                entries.push({ id: Date.now(), date, type: currentType, name, v1: currentType === 'swim' ? laps : weight, v2: currentType === 'swim' ? laps * 25 : reps, allWeights: [weight], allReps: [reps], bestWeight: (currentType !== 'swim' && reps >= 8) ? weight : 0 });
            }
            localStorage.setItem('mm_v13_data', JSON.stringify(entries));
            document.getElementById('reps').value = ""; document.getElementById('weight').value = "";
            alert("Check! 💪"); refreshCurrentView();
        }

        function renderHistory() {
            const container = document.getElementById('view-history');
            const filtered = currentType ? entries.filter(e => e.type === currentType) : entries;
            container.innerHTML = filtered.slice().reverse().map(e => `
                <div class="glass p-4 flex justify-between items-center border-l-4 ${e.type==='swim'?'border-blue-500':e.type==='upper'?'border-pink-500':'border-yellow-500'}">
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-1">
                            <p class="text-[8px] text-gray-500 font-black uppercase">${e.date}</p>
                            ${getMediaIcon(e.name)}
                        </div>
                        <p class="font-bold uppercase text-xs tracking-tighter ${e.type==='swim'?'text-blue-400':e.type==='upper'?'text-pink-400':'text-yellow-400'}">${e.name}</p>
                    </div>
                    <div class="text-right space-y-1.5">
                        <div class="flex justify-end gap-1 flex-wrap max-w-[100px]">
                            ${e.type === 'swim' ? `<span class="badge-common bg-blue-500/10 text-blue-400 border border-blue-500/20">${e.v1} L</span>` : e.allWeights.map(w => `<span class="badge-common bg-white/5 border border-white/10">${w}k</span>`).join('')}
                        </div>
                        <div class="flex justify-end gap-1 flex-wrap max-w-[100px]">
                            ${e.type === 'swim' ? `<span class="badge-common bg-white/5 border border-white/10 text-gray-400">${e.v2}m</span>` : e.allReps.map(r => `<span class="badge-common bg-pink-500/10 text-pink-500 border border-pink-500/20">${r}</span>`).join('')}
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function getMediaIcon(name) {
            const url = mediaMap[name];
            return url 
                ? `<button onclick="openMedia('${name}')" class="w-4 h-4 rounded-full bg-pink-500 flex items-center justify-center text-[10px] font-bold">?</button>`
                : `<button onclick="promptMedia('${name}')" class="w-4 h-4 rounded-full bg-white/10 flex items-center justify-center text-[10px] font-bold text-gray-500">+</button>`;
        }

        function promptMedia(name) {
            const url = prompt(`Lien (Direct Image/GIF/MP4) pour ${name}:`);
            if(url) { mediaMap[name] = url; localStorage.setItem('mm_media_map', JSON.stringify(mediaMap)); refreshCurrentView(); }
        }

        function openMedia(name) {
            const url = mediaMap[name];
            const content = document.getElementById('media-content');
            const isVideo = url.endsWith('.mp4') || url.endsWith('.mov');
            content.innerHTML = isVideo 
                ? `<video src="${url}" autoplay loop muted class="w-full h-full object-cover"></video>` 
                : `<img src="${url}" class="w-full h-full object-contain">`;
            document.getElementById('media-modal').classList.remove('hidden');
        }

        function closeMedia() { document.getElementById('media-modal').classList.add('hidden'); }

        function renderProgression() {
            const container = document.getElementById('view-stats');
            container.innerHTML = "";
            const filtered = currentType ? entries.filter(e => e.type === currentType) : entries;
            const machines = [...new Set(filtered.map(e => e.name))];
            machines.forEach(m => {
                const data = filtered.filter(e => e.name === m).sort((a,b) => new Date(a.date) - new Date(b.date));
                const color = data[0].type === 'swim' ? '#3b82f6' : data[0].type === 'upper' ? '#ec4899' : '#eab308';
                const card = document.createElement('div');
                card.className = "glass p-4";
                card.innerHTML = `<div class="flex items-center justify-center gap-2 mb-4">${getMediaIcon(m)}<p class="text-[9px] font-black uppercase tracking-widest" style="color:${color}">${m}</p></div><canvas id="chart-${m.replace(/\s+/g, '-')}"></canvas>`;
                container.appendChild(card);
                new Chart(document.getElementById(`chart-${m.replace(/\s+/g, '-')}`), { type: 'line', data: { labels: data.map(d => d.date), datasets: [{ data: data.map(d => d.type === 'swim' ? d.v2 : d.bestWeight), borderColor: color, fill: true, tension: 0.4, pointRadius: 4, backgroundColor: color + '1A' }] }, options: { plugins: { legend: { display: false } }, scales: { y: { display: true, ticks: { color: color, font: { size: 8 } } }, x: { display: false } } } });
            });
            lucide.createIcons();
        }

        function deleteEntry(id) { if(confirm("Supprimer ?")) { entries = entries.filter(e => e.id !== id); localStorage.setItem('mm_v13_data', JSON.stringify(entries)); refreshCurrentView(); } }
        function updateSuggestions() { const list = document.getElementById('suggestions'); const unique = [...new Set(entries.filter(e => !currentType || e.type === currentType).map(e => e.name))]; list.innerHTML = unique.map(name => `<option value="${name}">`).join(''); }
        function calcDist() { document.getElementById('swim-total').innerText = (document.getElementById('swim-laps').value || 0) * 25; }
        function refreshCurrentView() { if(currentTab === 'history') renderHistory(); if(currentTab === 'stats') renderProgression(); }
        lucide.createIcons();
    </script>
</body>
</html>
