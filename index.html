<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Musclor Mommy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: white; height: 100vh; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        .text-gradient { background: linear-gradient(135deg, #ff0080 0%, #ff8c00 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; outline: none; text-align: center; color: white; }
        .tab-btn { opacity: 0.2; transition: 0.3s; }
        .tab-btn.active { opacity: 1; transform: scale(1.1); }
        .view-container { height: calc(100vh - 200px); overflow-y: auto; scrollbar-width: none; padding-bottom: 60px; }
        .view-container::-webkit-scrollbar { display: none; }
        .badge-common { padding: 2px 8px; border-radius: 8px; font-size: 10px; font-weight: 800; }
        .hidden { display: none !important; }
        
        /* Floating Buttons Navigation */
        .nav-btn { width: 56px; height: 56px; border-radius: 50%; display: flex; items-center; justify-center; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .nav-btn.active { background: #ff0080; color: white; transform: translateY(-10px); box-shadow: 0 15px 30px rgba(255, 0, 128, 0.3); }

        /* Media Modal */
        #media-modal { background: rgba(0,0,0,0.95); z-index: 1000; }
    </style>
</head>
<body class="p-5">

    <div id="media-modal" class="fixed inset-0 hidden flex flex-col items-center justify-center p-6">
        <button onclick="closeMedia()" class="absolute top-10 right-6 text-white"><i data-lucide="x-circle" size="36"></i></button>
        <div id="media-content" class="glass w-full max-w-sm aspect-square flex items-center justify-center overflow-hidden">
            </div>
    </div>

    <header class="flex flex-col items-center mb-4">
        <h1 class="text-2xl font-black italic text-gradient uppercase tracking-tighter text-center">Musclor Mommy</h1>
        <input type="date" id="input-date" class="mt-2 bg-transparent border-none text-[11px] font-bold text-gray-500 uppercase outline-none">
    </header>

    <div class="flex justify-center gap-8 mb-6">
        <button onclick="setGlobalFilter('swim')" id="btn-swim" class="tab-btn flex flex-col items-center"><div class="p-3.5 rounded-2xl bg-blue-500/10 text-blue-400 border border-blue-500/20"><i data-lucide="waves" size="20"></i></div><span class="text-[8px] font-black uppercase mt-1">Pool</span></button>
        <button onclick="setGlobalFilter('upper')" id="btn-upper" class="tab-btn flex flex-col items-center"><div class="p-3.5 rounded-2xl bg-pink-500/10 text-pink-400 border border-pink-500/20"><i data-lucide="dumbbell" size="20"></i></div><span class="text-[8px] font-black uppercase mt-1">Upper</span></button>
        <button onclick="setGlobalFilter('legs')" id="btn-legs" class="tab-btn flex flex-col items-center"><div class="p-3.5 rounded-full bg-yellow-500/10 text-yellow-400 border border-yellow-500/20"><i data-lucide="zap" size="20"></i></div><span class="text-[8px] font-black uppercase mt-1">Legs</span></button>
    </div>

    <div class="view-container">
        <div id="view-log" class="hidden animate-in fade-in duration-300">
            <div class="glass p-6 space-y-6">
                <div class="text-center space-y-1">
                    <label id="label-name" class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Exercise Name</label>
                    <input type="text" id="exercise-name" list="suggestions" placeholder="..." class="w-full py-4 text-xl font-bold uppercase outline-none">
                    <datalist id="suggestions"></datalist>
                </div>

                <div id="pool-fields" class="hidden text-center">
                    <label class="text-[10px] font-black text-blue-500 uppercase block mb-1">Laps (25m)</label>
                    <input type="number" id="swim-laps" oninput="calcDist()" placeholder="0" class="w-full py-5 text-5xl font-black text-blue-400">
                    <p class="mt-2 text-xs font-bold text-gray-400 italic">Distance: <span id="swim-total" class="text-blue-400">0</span>m</p>
                </div>

                <div id="muscle-fields" class="space-y-4">
                    <div class="flex gap-3">
                        <div class="flex-1 relative">
                            <label class="text-[10px] font-black text-red-500 uppercase block mb-1">Weight</label>
                            <input type="number" id="weight" placeholder="0" class="w-full py-4 text-3xl font-black">
                            <button onclick="toggleUnit()" id="unit-btn" class="absolute right-2 bottom-4 text-[8px] font-black text-gray-500 bg-white/5 px-2 py-1 rounded">KG</button>
                        </div>
                        <div class="w-1/3">
                            <label class="text-[10px] font-black text-pink-500 uppercase block mb-1 text-center">Reps</label>
                            <input type="number" id="reps" placeholder="0" class="w-full py-4 text-3xl font-black italic">
                        </div>
                    </div>
                </div>
                <button onclick="addEntry()" id="btn-submit-log" class="w-full py-5 rounded-2xl font-black text-xs uppercase tracking-widest text-white shadow-xl active:scale-95 transition-all">LOG WORKOUT</button>
            </div>
        </div>

        <div id="view-history" class="hidden space-y-3"></div>
        <div id="view-stats" class="hidden space-y-6"></div>
    </div>

    <div class="fixed bottom-10 left-0 right-0 flex justify-center items-end gap-10 px-10">
        <button onclick="changeTab('log')" id="nav-log" class="nav-btn bg-white/5 border border-white/10 text-gray-500 active">
            <i data-lucide="plus" size="24"></i>
        </button>
        <button onclick="changeTab('history')" id="nav-history" class="nav-btn bg-white/5 border border-white/10 text-gray-500">
            <i data-lucide="list" size="24"></i>
        </button>
        <button onclick="changeTab('stats')" id="nav-stats" class="nav-btn bg-white/5 border border-white/10 text-gray-500">
            <i data-lucide="activity" size="24"></i>
        </button>
    </div>

    <script>
        let currentType = null; 
        let entries = JSON.parse(localStorage.getItem('mm_v14_data')) || [];
        let mediaMap = JSON.parse(localStorage.getItem('mm_media_map_v2')) || {}; 
        let currentTab = 'log';
        let isLb = false;
        document.getElementById('input-date').valueAsDate = new Date();

        function toggleUnit() { isLb = !isLb; document.getElementById('unit-btn').innerText = isLb ? 'LB' : 'KG'; }

        function setGlobalFilter(type) {
            currentType = (currentType === type) ? null : type;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if(currentType) {
                document.getElementById('btn-'+currentType).classList.add('active');
                document.getElementById('view-log').classList.remove('hidden');
                document.getElementById('pool-fields').classList.toggle('hidden', currentType !== 'swim');
                document.getElementById('muscle-fields').classList.toggle('hidden', currentType === 'swim');
                document.getElementById('label-name').innerText = currentType === 'swim' ? "Stroke Type" : "Machine Used";
                const btn = document.getElementById('btn-submit-log');
                btn.style.backgroundColor = currentType === 'swim' ? '#3b82f6' : (currentType === 'upper' ? '#ec4899' : '#eab308');
            } else { document.getElementById('view-log').classList.add('hidden'); }
            refreshCurrentView();
            updateSuggestions();
        }

        function changeTab(tab) {
            currentTab = tab;
            ['log', 'history', 'stats'].forEach(t => document.getElementById('view-'+t).classList.add('hidden'));
            if (tab === 'log' && currentType) document.getElementById('view-log').classList.remove('hidden');
            else if (tab !== 'log') document.getElementById('view-'+tab).classList.remove('hidden');
            
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('nav-'+tab).classList.add('active');
            refreshCurrentView();
        }

        function addEntry() {
            const name = document.getElementById('exercise-name').value.trim().toUpperCase();
            if(!name || !currentType) return;
            let weight = parseFloat(document.getElementById('weight').value) || 0;
            if(isLb) weight = parseFloat((weight * 0.453).toFixed(1));
            const reps = parseInt(document.getElementById('reps').value) || 0;
            const laps = parseInt(document.getElementById('swim-laps').value) || 0;
            const date = document.getElementById('input-date').value;

            let existing = entries.find(e => e.date === date && e.name === name && e.type === currentType);
            if(existing) {
                if(currentType === 'swim') { existing.v1 = (parseInt(existing.v1) || 0) + laps; existing.v2 = existing.v1 * 25; } 
                else { existing.allWeights = [...(existing.allWeights || [existing.v1]), weight]; existing.allReps = [...(existing.allReps || [existing.v2]), reps];
                if(reps >= 8 && weight > (existing.bestWeight || 0)) existing.bestWeight = weight; }
            } else {
                entries.push({ id: Date.now(), date, type: currentType, name, v1: currentType === 'swim' ? laps : weight, v2: currentType === 'swim' ? laps * 25 : reps, allWeights: [weight], allReps: [reps], bestWeight: (currentType !== 'swim' && reps >= 8) ? weight : 0 });
            }
            localStorage.setItem('mm_v14_data', JSON.stringify(entries));
            document.getElementById('reps').value = ""; document.getElementById('weight').value = "";
            alert("Entry Saved! 💪"); refreshCurrentView();
        }

        function renderHistory() {
            const container = document.getElementById('view-history');
            const filtered = currentType ? entries.filter(e => e.type === currentType) : entries;
            container.innerHTML = filtered.slice().reverse().map(e => `
                <div class="glass p-4 flex justify-between items-center border-l-4 ${e.type==='swim'?'border-blue-500':e.type==='upper'?'border-pink-500':'border-yellow-500'}">
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-1">
                            <p class="text-[8px] text-gray-500 font-black uppercase">${e.date}</p>
                            ${getMediaIcon(e.name)}
                        </div>
                        <p class="font-bold uppercase text-xs tracking-tighter ${e.type==='swim'?'text-blue-400':e.type==='upper'?'text-pink-400':'text-yellow-400'}">${e.name}</p>
                    </div>
                    <div class="text-right flex items-center gap-3">
                        <div class="space-y-1">
                            <div class="flex justify-end gap-1 flex-wrap max-w-[100px]">
                                ${e.type === 'swim' ? `<span class="badge-common bg-blue-500/10 text-blue-400">${e.v1} L</span>` : e.allWeights.map(w => `<span class="badge-common bg-white/5 border border-white/10 text-white">${w}k</span>`).join('')}
                            </div>
                            <div class="flex justify-end gap-1 flex-wrap max-w-[100px]">
                                ${e.type === 'swim' ? `<span class="badge-common bg-white/5 text-gray-400">${e.v2}m</span>` : e.allReps.map(r => `<span class="badge-common bg-pink-500/10 text-pink-500">${r}</span>`).join('')}
                            </div>
                        </div>
                        <button onclick="deleteEntry(${e.id})" class="text-gray-800"><i data-lucide="trash-2" size="14"></i></button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function getMediaIcon(name) {
            const url = mediaMap[name];
            const color = currentType === 'swim' ? 'bg-blue-500' : (currentType === 'legs' ? 'bg-yellow-500' : 'bg-pink-500');
            return url 
                ? `<button onclick="openMedia('${name}')" class="w-4 h-4 rounded-full ${color} flex items-center justify-center text-[10px] font-bold">?</button>`
                : `<button onclick="promptMedia('${name}')" class="w-4 h-4 rounded-full bg-white/10 flex items-center justify-center text-[10px] font-bold text-gray-500">+</button>`;
        }

        function promptMedia(name) {
            const url = prompt(`Paste direct GIF or MP4 link for ${name}:`);
            if(url) { mediaMap[name] = url; localStorage.setItem('mm_media_map_v2', JSON.stringify(mediaMap)); refreshCurrentView(); }
        }

        function openMedia(name) {
            const url = mediaMap[name];
            const content = document.getElementById('media-content');
            // Advanced check for video extensions
            const isVideo = url.toLowerCase().match(/\.(mp4|mov|webm)$/);
            content.innerHTML = isVideo 
                ? `<video src="${url}" autoplay loop muted playsinline class="w-full h-full object-cover"></video>` 
                : `<img src="${url}" class="w-full h-full object-contain" onerror="this.src='https://via.placeholder.com/300?text=Invalid+Link'">`;
            document.getElementById('media-modal').classList.remove('hidden');
        }

        function closeMedia() { document.getElementById('media-modal').classList.add('hidden'); document.getElementById('media-content').innerHTML = ""; }

        function renderProgression() {
            const container = document.getElementById('view-stats'); container.innerHTML = "";
            const filtered = currentType ? entries.filter(e => e.type === currentType) : entries;
            const machines = [...new Set(filtered.map(e => e.name))];
            machines.forEach(m => {
                const data = filtered.filter(e => e.name === m).sort((a,b) => new Date(a.date) - new Date(b.date));
                const color = data[0].type === 'swim' ? '#3b82f6' : data[0].type === 'upper' ? '#ec4899' : '#eab308';
                const card = document.createElement('div');
                card.className = "glass p-4";
                card.innerHTML = `<div class="flex justify-between items-center mb-4"><div class="flex items-center gap-2">${getMediaIcon(m)}<p class="text-[9px] font-black uppercase tracking-widest" style="color:${color}">${m}</p></div><p class="text-[7px] text-gray-500 font-bold tracking-widest uppercase">${data[0].type==='swim'?'Dist(m)':'PR(kg)'}</p></div><canvas id="chart-${m.replace(/\s+/g, '-')}"></canvas>`;
                container.appendChild(card);
                new Chart(document.getElementById(`chart-${m.replace(/\s+/g, '-')}`), { type: 'line', data: { labels: data.map(d => d.date), datasets: [{ data: data.map(d => d.type === 'swim' ? d.v2 : d.bestWeight), borderColor: color, fill: true, tension: 0.4, pointRadius: 4, backgroundColor: color + '1A' }] }, options: { plugins: { legend: { display: false } }, scales: { y: { display: true, ticks: { color: color, font: { size: 8 } } }, x: { display: false } } } });
            });
            lucide.createIcons();
        }

        function deleteEntry(id) { if(confirm("Delete entry?")) { entries = entries.filter(e => e.id !== id); localStorage.setItem('mm_v14_data', JSON.stringify(entries)); refreshCurrentView(); } }
        function updateSuggestions() { const list = document.getElementById('suggestions'); const unique = [...new Set(entries.filter(e => !currentType || e.type === currentType).map(e => e.name))]; list.innerHTML = unique.map(name => `<option value="${name}">`).join(''); }
        function calcDist() { document.getElementById('swim-total').innerText = (document.getElementById('swim-laps').value || 0) * 25; }
        function refreshCurrentView() { if(currentTab === 'history') renderHistory(); if(currentTab === 'stats') renderProgression(); }
        lucide.createIcons();
    </script>
</body>
</html>
