<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Musclor Mommy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: white; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 32px; }
        .accent-pink { background: linear-gradient(135deg, #ff0080 0%, #ff8c00 100%); }
        .text-gradient { background: linear-gradient(135deg, #ff0080 0%, #ff8c00 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        input[type="number"], input[type="text"], input[type="date"] { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; text-align: center; outline: none; transition: 0.3s; }
        input:focus { border-color: #ff0080; background: rgba(255,255,255,0.1); }
        .tab-btn { transition: 0.3s; opacity: 0.4; }
        .tab-btn.active { opacity: 1; transform: scale(1.1); }
        .hidden { display: none; }
    </style>
</head>
<body class="pb-32">

    <header class="pt-12 pb-6 text-center">
        <h1 class="text-4xl font-black tracking-tighter text-gradient uppercase italic">Musclor Mommy</h1>
        <p class="text-gray-500 text-xs mt-1 font-bold tracking-[0.2em]">CONSISTENCY IS QUEEN 👑</p>
    </header>

    <main class="max-w-md mx-auto px-6">
        
        <div id="view-log" class="space-y-8">
            <div class="flex justify-center">
                <input type="date" id="input-date" class="px-4 py-2 text-sm font-bold">
            </div>

            <div class="flex justify-between gap-4">
                <button onclick="setType('swim')" id="btn-swim" class="tab-btn flex flex-col items-center gap-2"><div class="p-4 rounded-full bg-blue-500/20 text-blue-400"><i data-lucide="waves"></i></div><span class="text-[10px] font-black">POOL</span></button>
                <button onclick="setType('upper')" id="btn-upper" class="tab-btn active flex flex-col items-center gap-2"><div class="p-4 rounded-full bg-red-500/20 text-red-400"><i data-lucide="dumbbell"></i></div><span class="text-[10px] font-black">UPPER</span></button>
                <button onclick="setType('legs')" id="btn-legs" class="tab-btn flex flex-col items-center gap-2"><div class="p-4 rounded-full bg-yellow-500/20 text-yellow-400"><i data-lucide="zap"></i></div><span class="text-[10px] font-black">LEGS</span></button>
            </div>

            <div class="glass-card p-8 space-y-6">
                <div class="text-center space-y-2">
                    <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Nom de l'exercice / Machine</label>
                    <input type="text" id="exercise-name" placeholder="..." class="w-full py-4 text-xl font-bold">
                </div>

                <div id="pool-fields" class="hidden space-y-6">
                    <div class="text-center">
                        <label class="text-[10px] font-black text-blue-500 uppercase tracking-widest">Nombre de longueurs (25m)</label>
                        <input type="number" id="swim-laps" oninput="calcDist()" placeholder="0" class="w-full py-6 text-5xl font-black text-blue-400">
                        <p class="mt-2 text-lg font-bold text-gray-400">Total : <span id="swim-total" class="text-white">0</span> m</p>
                    </div>
                </div>

                <div id="muscle-fields" class="space-y-6">
                    <div class="text-center">
                        <label class="text-[10px] font-black text-red-500 uppercase tracking-widest text-gradient">Charge (KG)</label>
                        <input type="number" id="weight" placeholder="0" class="w-full py-6 text-5xl font-black">
                    </div>
                    <div class="space-y-2 text-center">
                        <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Répétitions (3 Séries)</label>
                        <div class="flex gap-3 justify-center text-center">
                            <input type="number" id="rep1" placeholder="S1" class="w-full py-4 text-2xl font-bold italic">
                            <input type="number" id="rep2" placeholder="S2" class="w-full py-4 text-2xl font-bold italic border-pink-500/30">
                            <input type="number" id="rep3" placeholder="S3" class="w-full py-4 text-2xl font-bold italic">
                        </div>
                    </div>
                </div>

                <button onclick="addEntry()" class="w-full py-5 accent-pink rounded-2xl font-black text-lg shadow-xl shadow-pink-500/20 active:scale-95 transition-all uppercase italic tracking-tighter">Valider Session</button>
            </div>
        </div>

        <div id="view-history" class="hidden space-y-4">
            <div id="history-container" class="space-y-4"></div>
        </div>
    </main>

    <nav class="fixed bottom-6 left-6 right-6 h-20 glass-card flex justify-around items-center px-4 border border-white/10 shadow-2xl">
        <button onclick="showTab('log')" class="p-3 text-gray-400 hover:text-white transition"><i data-lucide="plus-square"></i></button>
        <button onclick="showTab('history')" class="p-3 text-gray-400 hover:text-white transition"><i data-lucide="calendar"></i></button>
        <button onclick="showTab('stats')" class="p-3 text-gray-400 hover:text-white transition"><i data-lucide="line-chart"></i></button>
    </nav>

    <script>
        let currentType = 'upper';
        let entries = JSON.parse(localStorage.getItem('mm_v3_data')) || [];
        document.getElementById('input-date').valueAsDate = new Date();

        function setType(type) {
            currentType = type;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-'+type).classList.add('active');
            
            document.getElementById('pool-fields').classList.toggle('hidden', type !== 'swim');
            document.getElementById('muscle-fields').classList.toggle('hidden', type === 'swim');
        }

        function calcDist() {
            const laps = document.getElementById('swim-laps').value || 0;
            document.getElementById('swim-total').innerText = laps * 25;
        }

        function addEntry() {
            const name = document.getElementById('exercise-name').value;
            if(!name) return alert("Donne un nom à l'exo !");

            const entry = {
                id: Date.now(),
                date: document.getElementById('input-date').value,
                type: currentType,
                name: name,
                v1: currentType === 'swim' ? document.getElementById('swim-laps').value : document.getElementById('weight').value,
                v2: currentType === 'swim' ? (document.getElementById('swim-laps').value * 25) : `${document.getElementById('rep1').value || 0} / ${document.getElementById('rep2').value || 0} / ${document.getElementById('rep3').value || 0}`
            };
            
            entries.push(entry);
            localStorage.setItem('mm_v3_data', JSON.stringify(entries));
            alert("Enregistré ! Continue comme ça ✨");
            resetForm();
        }

        function resetForm() {
            document.getElementById('exercise-name').value = "";
            document.getElementById('swim-laps').value = "";
            document.getElementById('weight').value = "";
            document.getElementById('rep1').value = ""; document.getElementById('rep2').value = ""; document.getElementById('rep3').value = "";
            calcDist();
        }

        function showTab(tab) {
            document.getElementById('view-log').classList.toggle('hidden', tab !== 'log');
            document.getElementById('view-history').classList.toggle('hidden', tab !== 'history');
            if(tab === 'history') renderHistory();
        }

        function renderHistory() {
            const container = document.getElementById('history-container');
            container.innerHTML = entries.slice().reverse().map(e => `
                <div class="glass-card p-6 flex justify-between items-center border-l-4 ${e.type==='swim'?'border-blue-500':e.type==='upper'?'border-red-500':'border-yellow-500'}">
                    <div>
                        <p class="text-[10px] font-black text-gray-500">${new Date(e.date).toLocaleDateString('fr-FR')}</p>
                        <p class="font-bold text-lg uppercase italic">${e.name}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-2xl font-black">${e.v1}<span class="text-xs text-gray-500 ml-1">${e.type==='swim'?'L':'KG'}</span></p>
                        <p class="text-xs font-bold text-pink-500 italic">${e.v2}${e.type==='swim'?'m':''}</p>
                    </div>
                </div>
            `).join('');
        }

        lucide.createIcons();
    </script>
</body>
</html>
