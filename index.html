<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Musclor Mommy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0f172a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(90deg, #ff7eb3, #ff758c, #ff7eb3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .tab-active { color: #ff7eb3; border-bottom: 2px solid #ff7eb3; }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">

    <header class="p-6 pt-8">
        <h1 class="text-3xl font-black italic tracking-tighter uppercase gradient-text">Musclor Mommy</h1>
        <p class="text-gray-400 text-sm">Prête à tout casser aujourd'hui ? 💪</p>
    </header>

    <div class="flex px-6 mb-6 gap-6 text-sm font-bold uppercase tracking-widest border-b border-white/10">
        <button onclick="showTab('log')" id="tab-log" class="pb-2 tab-active">Log</button>
        <button onclick="showTab('history')" id="tab-history" class="pb-2 text-gray-500">History</button>
        <button onclick="showTab('stats')" id="tab-stats" class="pb-2 text-gray-500">Progression</button>
    </div>

    <main id="view-log" class="px-4 space-y-4">
        <div class="glass rounded-3xl p-6">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-lg font-bold italic">NOUVELLE ENTRÉE</h2>
                <input type="date" id="input-date" class="bg-white/10 text-xs p-2 rounded-lg outline-none border border-white/20">
            </div>

            <div class="flex gap-2 mb-6">
                <button onclick="setType('swim')" id="btn-swim" class="flex-1 p-3 rounded-xl glass border-blue-500/50 text-blue-400 flex flex-col items-center gap-1"><i data-lucide="waves"></i><span class="text-[10px] font-bold">SWIM</span></button>
                <button onclick="setType('upper')" id="btn-upper" class="flex-1 p-3 rounded-xl glass border-red-500/50 text-red-400 flex flex-col items-center gap-1"><i data-lucide="dumbbell"></i><span class="text-[10px] font-bold">UPPER</span></button>
                <button onclick="setType('legs')" id="btn-legs" class="flex-1 p-3 rounded-xl glass border-yellow-500/50 text-yellow-400 flex flex-col items-center gap-1"><i data-lucide="zap"></i><span class="text-[10px] font-bold">LEGS</span></button>
            </div>

            <div id="dynamic-inputs" class="space-y-4">
                <input type="text" id="exercise-name" placeholder="Nom de l'exo / Nage" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none focus:border-pink-500">
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white/5 p-4 rounded-2xl border border-white/10">
                        <label id="label-v1" class="text-[10px] font-bold text-gray-400 block mb-1 uppercase">POIDS (KG)</label>
                        <input type="number" id="val1" class="bg-transparent text-2xl font-bold w-full outline-none">
                    </div>
                    <div class="bg-white/5 p-4 rounded-2xl border border-white/10">
                        <label id="label-v2" class="text-[10px] font-bold text-gray-400 block mb-1 uppercase">REPS / DIST</label>
                        <input type="text" id="val2" class="bg-transparent text-2xl font-bold w-full outline-none">
                    </div>
                </div>
            </div>

            <button onclick="addEntry()" class="w-full mt-6 py-4 bg-gradient-to-r from-pink-500 to-rose-500 rounded-2xl font-black shadow-lg shadow-pink-500/20 active:scale-95 transition">ENREGISTRER</button>
        </div>
    </main>

    <main id="view-history" class="px-4 hidden space-y-4">
        <div id="history-container" class="space-y-3">
            </div>
    </main>

    <main id="view-stats" class="px-4 hidden space-y-6">
        <div class="glass p-4 rounded-3xl">
            <select id="filter-exercise" onchange="updateChart()" class="w-full bg-transparent p-2 font-bold outline-none mb-4 border-b border-white/10">
                </select>
            <canvas id="progChart" class="w-full"></canvas>
        </div>
    </main>

    <script>
        let currentType = 'upper';
        let entries = JSON.parse(localStorage.getItem('mm_data')) || [];
        
        // Init date
        document.getElementById('input-date').valueAsDate = new Date();

        function setType(type) {
            currentType = type;
            const colors = { swim: 'blue', upper: 'red', legs: 'yellow' };
            ['swim', 'upper', 'legs'].forEach(t => {
                document.getElementById('btn-'+t).style.background = t === type ? `rgba(255,255,255,0.1)` : '';
                document.getElementById('btn-'+t).style.borderColor = t === type ? '' : 'rgba(255,255,255,0.1)';
            });
            document.getElementById('label-v1').innerText = type === 'swim' ? 'LONGUEURS' : 'POIDS (KG)';
            document.getElementById('label-v2').innerText = type === 'swim' ? 'DISTANCE (M)' : 'REPS (EX: 12,12,8)';
        }

        function addEntry() {
            const entry = {
                id: Date.now(),
                date: document.getElementById('input-date').value,
                type: currentType,
                name: document.getElementById('exercise-name').value || "Inconnu",
                v1: document.getElementById('val1').value,
                v2: document.getElementById('val2').value
            };
            entries.push(entry);
            localStorage.setItem('mm_data', JSON.stringify(entries));
            alert("Validé Mommy ! ✨");
            renderHistory();
        }

        function deleteEntry(id) {
            if(confirm("On supprime ?")) {
                entries = entries.filter(e => e.id !== id);
                localStorage.setItem('mm_data', JSON.stringify(entries));
                renderHistory();
                updateStatsList();
            }
        }

        function renderHistory() {
            const container = document.getElementById('history-container');
            container.innerHTML = entries.slice().sort((a,b) => new Date(b.date) - new Date(a.date)).map(e => `
                <div class="glass p-4 rounded-2xl flex justify-between items-center relative group">
                    <div class="flex items-center gap-4">
                        <div class="w-2 h-10 rounded-full ${e.type==='swim'?'bg-blue-500':e.type==='upper'?'bg-red-500':'bg-yellow-500'}"></div>
                        <div>
                            <p class="text-[10px] font-bold text-gray-500 uppercase">${new Date(e.date).toLocaleDateString('fr-FR')}</p>
                            <p class="font-bold uppercase tracking-tight">${e.name}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="text-right">
                            <p class="text-xl font-black">${e.v1}<span class="text-[10px] text-gray-400 ml-1">${e.type==='swim'?'L':'KG'}</span></p>
                            <p class="text-[10px] font-medium text-pink-400 italic">${e.v2}</p>
                        </div>
                        <button onclick="deleteEntry(${e.id})" class="text-gray-600 hover:text-red-500 transition"><i data-lucide="trash-2" size="18"></i></button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function showTab(tab) {
            ['log', 'history', 'stats'].forEach(t => {
                document.getElementById('view-'+t).classList.add('hidden');
                document.getElementById('tab-'+t).className = 'pb-2 text-gray-500';
            });
            document.getElementById('view-'+tab).classList.remove('hidden');
            document.getElementById('tab-'+tab).className = 'pb-2 tab-active';
            if(tab === 'stats') updateStatsList();
            if(tab === 'history') renderHistory();
        }

        function updateStatsList() {
            const select = document.getElementById('filter-exercise');
            const uniqueNames = [...new Set(entries.map(e => e.name))];
            select.innerHTML = uniqueNames.map(n => `<option value="${n}">${n}</option>`).join('');
            updateChart();
        }

        let myChart;
        function updateChart() {
            const name = document.getElementById('filter-exercise').value;
            const data = entries.filter(e => e.name === name).sort((a,b) => new Date(a.date) - new Date(b.date));
            const ctx = document.getElementById('progChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => d.date),
                    datasets: [{
                        label: 'Progression',
                        data: data.map(d => d.v1),
                        borderColor: '#ff7eb3',
                        backgroundColor: 'rgba(255, 126, 179, 0.2)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: { scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' } }, x: { display: false } } }
            });
        }

        lucide.createIcons();
        setType('upper');
    </script>
</body>
</html>
